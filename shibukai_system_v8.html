.sc-num{font-size:28px;font-weight:500;color:#7248b9}
.sc-lbl{font-size:12px;color:#5f6368;margin-top:4px}

.badge-opt{font-size:11px;padding:2px 7px;border-radius:10px;background:#f0f0f0;color:#888;font-weight:500;white-space:nowrap}
.opt-list{display:flex;flex-direction:column;gap:8px}
.opt-row{display:flex;align-items:center;gap:8px}
.opt-inp{flex:1;padding:7px 10px;border:1px solid #dadce0;border-radius:6px;font-size:14px;color:#202124;outline:none}
.opt-inp:focus{border-color:#7248b9;box-shadow:0 0 0 2px #ede8fc}

.opt-del:hover{color:#d93025}

.opt-add-btn:hover{background:#f8f5ff}
.opt-fixed{font-size:13px;color:#888;padding:7px 10px;background:#f5f5f5;border-radius:6px;border:1px solid #e0e0e0;margin-top:4px}
.divider{border:none;border-top:1px solid #f0f0f0;margin:20px 0}
.save-bar{display:flex;gap:10px}
.save-btn{background:#7248b9;color:white;border:none;padding:10px 24px;font-size:14px;border-radius:6px;cursor:pointer}
.save-btn:hover{background:#5c3a9a}
.reset-btn{background:white;color:#5f6368;border:1px solid #dadce0;padding:10px 20px;font-size:14px;border-radius:6px;cursor:pointer}
.reset-btn:hover{background:#f8f8f8}
.preview-bg{background:#f0ebf8;border-radius:8px;padding:16px}
.prev-header{background:white;border-radius:6px;border-top:6px solid #7248b9;padding:14px 16px;margin-bottom:8px}
.prev-sec{background:white;border-radius:6px;padding:10px 14px;margin-bottom:6px;border-left:3px solid #ede8fc}
.prev-qt{font-size:13px;color:#202124;font-weight:500;margin-bottom:4px}
.prev-opts{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.prev-opt{font-size:11px;background:#f3f0fc;color:#534AB7;padding:3px 8px;border-radius:10px}
.prev-note{font-size:11px;color:#9e9e9e}
.adm-toast{margin:12px 0 0;background:#323232;color:white;padding:12px 20px;border-radius:6px;font-size:14px;text-align:center;display:none}

<!-- LOGIN -->
<div id="pg-login" class="page active">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">支部会開催報告</div>
      <div class="login-sub">2026年度 入力システム</div>

      <button class="l-btn" onclick="doLogin()">ログイン</button>
      <div class="pw-hint">ご入力いただくパスワードは担当者よりお知らせします。<br><span style="color:#888;font-size:11px">※デモ用　入力者：<strong>1117</strong>　管理者：<strong>admin2026</strong></span></div>
    </div>
  </div>
</div>

<!-- FORM -->
<div id="pg-form" class="page">
  <div class="form-wrap">
    <div class="f-header">
      <div class="f-header-inner">
        <div class="f-title" id="disp-form-title"></div>
        <div class="f-req-note" id="disp-req-note"></div>
      </div>
    </div>

    <!-- Q1: 議会・氏名 -->
    <div class="f-sec">
      <div class="qt" id="disp-q1"></div>
      <div style="margin-bottom:16px">
        <div class="dlbl">議会名を選択してください</div>
        <select class="sel" id="gikai" onchange="updateMembers()"><option value="">選択してください</option></select>
      </div>
      <div id="member-wrap" class="hidden">
        <div class="dlbl" style="margin-bottom:8px">氏名を選択してください</div>
        <div class="member-list" id="member-list"></div>
      </div>
    </div>

    <!-- Q2: 総支部・開催単位 -->
    <div class="f-sec">
      <div class="qt" id="disp-q2"></div>
      <div style="margin-bottom:16px">
        <div class="dlbl">総支部を選択してください</div>
        <select class="sel" id="soushi" onchange="updateShibu()">
          <option value="">選択してください</option>
          <option>東神戸</option><option>中央神戸</option><option>西神戸</option><option>明石</option>
          <option>尼崎</option><option>西宮</option><option>東兵庫</option><option>播磨</option>
          <option>姫路</option><option>北兵庫</option>
        </select>
      </div>
      <div id="shibu-wrap" class="hidden">
        <div class="dlbl" style="margin-bottom:6px">開催単位を選択してください</div>
        <select class="sel" id="shibu" onchange="onShibuChange()">
          <option value="">選択してください</option>
        </select>
        <div id="godo-wrap" class="hidden">
          <div class="godo-note" style="margin-top:12px">合同開催の内容を入力してください</div>
          <input class="inp" id="godo-text" type="text" placeholder="例：東灘・灘合同" style="margin-top:8px">
        </div>
      </div>
    </div>

    <!-- Q3: 開催日時 -->
    <div class="f-sec">
      <div class="qt" id="disp-q3"></div>
      <div class="dgrid">
        <div><div class="dlbl">月</div>
          <select class="sel" id="month" onchange="buildDays()">
            <option value="">月</option>
            <option>4</option><option>5</option><option>6</option><option>7</option>
            <option>8</option><option>9</option><option>10</option><option>11</option>
            <option>12</option><option>1</option><option>2</option><option>3</option>
          </select>
        </div>
        <div><div class="dlbl">日</div>
          <select class="sel" id="day" onchange="showDow()"><option value="">日</option></select>
        </div>
      </div>
      <div id="dow-disp" style="font-size:15px;color:#202124;margin-top:14px;min-height:22px"></div>
    </div>

    <!-- Q4: 国会担当 -->
    <div class="f-sec">
      <div class="qt" id="disp-q4"></div>
      <div class="rg" id="kokkai-rg"></div>
      <div id="other-wrap" class="hidden" style="margin-top:8px">
        <input class="inp" id="other-name" type="text" placeholder="氏名を入力してください" style="margin-left:30px;width:calc(100% - 30px)">
      </div>
    </div>

    <!-- Q5-7: 参加者数 -->
    <div class="f-sec">
      <div class="qt" id="disp-q5" style="margin-bottom:20px"></div>
      <input class="inp" id="sonen" type="text" placeholder="人数を入力">
      <div class="qt" id="disp-q6" style="margin-top:28px;margin-bottom:20px"></div>
      <input class="inp" id="josi" type="text" placeholder="人数を入力">
      <div class="qt" id="disp-q7" style="margin-top:28px;margin-bottom:20px"></div>
      <input class="inp" id="seinen" type="text" placeholder="人数を入力">
    </div>

    <!-- Q8: 自由記述 -->
    <div class="f-sec">
      <div class="qt" id="disp-q8"></div>
      <textarea class="txta" id="freeText" placeholder="自由にご記入ください"></textarea>
    </div>

    <div class="btn-row">
      <button class="sbtn" onclick="submitForm()">送信</button>
      <button class="obtn" onclick="logout()">ログアウト</button>
    </div>
    <div class="toast" id="f-toast"></div>
    <div class="f-footer">入力内容はセッション中保存されます。</div>
  </div>
</div>

<!-- ADMIN -->

<script>
const PASS_USER="1117", PASS_ADMIN="admin2026";
const DOW=["日","月","火","水","木","金","土"];

const SOUSHI_SHIBU={
  "東神戸":["東灘","灘","中央"],
  "中央神戸":["兵庫","長田","北","北神戸"],

function init(){
  const gSel=document.getElementById('gikai'),fSel=document.getElementById('f-gikai');
  GIKAI_DATA.forEach(d=>{[gSel,fSel].forEach(s=>{const o=document.createElement('option');o.value=d.g;o.textContent=d.g;s.appendChild(o);});});
  applyConfig();
}

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function logout(){showPage('pg-login');document.getElementById('pw-inp').value='';}
function doLogin(){
  const pw=document.getElementById('pw-inp').value.trim(),err=document.getElementById('pw-err');
  if(pw===PASS_ADMIN){err.textContent='';renderAdmin();buildEditUI();showPage('pg-admin');}
  else if(pw===PASS_USER){err.textContent='';showPage('pg-form');}
  else err.textContent='パスワードが正しくありません。';
}
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.adm-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
}

function applyConfig(){
  document.getElementById('disp-form-title').textContent=cfg.title;
  const hasReq=cfg.qs.some(q=>q.req);
  document.getElementById('disp-req-note').textContent=hasReq?'* は必須項目です':'';
  cfg.qs.forEach(q=>{const el=document.getElementById('disp-'+q.key);if(el)el.innerHTML=q.req?q.label+'<span class="req">*</span>':q.label;});
  buildKokkaiForm();
  updatePreview();
}

function updateShibu(){
  const s=document.getElementById('soushi').value;
  const shibuSel=document.getElementById('shibu');
  const shibuWrap=document.getElementById('shibu-wrap');
  const godoWrap=document.getElementById('godo-wrap');
  shibuSel.innerHTML='<option value="">選択してください</option>';
  godoWrap.classList.add('hidden');
  document.getElementById('godo-text').value='';
  if(!s){shibuWrap.classList.add('hidden');return;}
  const shibus=SOUSHI_SHIBU[s]||[];
  shibus.forEach(sb=>{const o=document.createElement('option');o.value=sb;o.textContent=sb;shibuSel.appendChild(o);});
  const godo=document.createElement('option');godo.value='合同開催';godo.textContent='合同開催';shibuSel.appendChild(godo);
  shibuWrap.classList.remove('hidden');
}

function onShibuChange(){
  const v=document.getElementById('shibu').value;
  const godoWrap=document.getElementById('godo-wrap');
  if(v==='合同開催'){godoWrap.classList.remove('hidden');}
  else{godoWrap.classList.add('hidden');document.getElementById('godo-text').value='';}
}

function getShibuValue(){
  const shibu=document.getElementById('shibu').value;
  if(shibu==='合同開催'){return '合同開催：'+document.getElementById('godo-text').value;}
  return shibu;
}

function buildKokkaiForm(){
  const rg=document.getElementById('kokkai-rg');
  rg.innerHTML='';
  cfg.kokkaiOpts.forEach(opt=>{
    const lbl=document.createElement('label');lbl.className='ri';
    lbl.innerHTML=`<input type="radio" name="kokkai" value="${opt}" onchange="toggleOther()">${opt}`;
    rg.appendChild(lbl);
  });
  const lO=document.createElement('label');lO.className='ri';
  lO.innerHTML=`<input type="radio" name="kokkai" value="その他" onchange="toggleOther()">その他`;
  rg.appendChild(lO);
  const lN=document.createElement('label');lN.className='ri';
  lN.innerHTML=`<input type="radio" name="kokkai" value="なし" onchange="toggleOther()">なし`;
  rg.appendChild(lN);
  const fk=document.getElementById('f-kokkai');
  if(fk){
    fk.innerHTML='<option value="">国会担当 すべて</option>';
    cfg.kokkaiOpts.forEach(opt=>{const o=document.createElement('option');o.value=opt;o.textContent=opt;fk.appendChild(o);});
    ['その他','なし'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;fk.appendChild(o);});
  }
}

function buildEditUI(){
  document.getElementById('ed-title').value=cfg.title;
  const wrap=document.getElementById('q-rows-wrap');wrap.innerHTML='';
  cfg.qs.forEach(q=>{
    const row=document.createElement('div');row.className='q-row';
    const fn=q.fixed?'<span style="font-size:11px;color:#bbb;margin-left:4px">（常に必須）</span>':'';
    row.innerHTML=`<span class="q-row-num">${q.label.substring(0,1)}</span>
      <input class="q-row-inp" id="ed-${q.key}" type="text" value="${q.label}">
      <label class="req-toggle"><input type="checkbox" id="req-${q.key}" ${q.req?'checked':''} ${q.fixed?'disabled':''} onchange="toggleReqBadge('${q.key}',this.checked)">必須</label>
      <span class="badge-${q.req?'req':'opt'}" id="badge-${q.key}">${q.req?'必須':'任意'}</span>${fn}`;
    wrap.appendChild(row);
  });
  buildKokkaiOptEdit();
}

function buildKokkaiOptEdit(){
  const wrap=document.getElementById('kokkai-opts-edit');wrap.innerHTML='';
  cfg.kokkaiOpts.forEach((opt,i)=>{
    const row=document.createElement('div');row.className='opt-row';
    row.innerHTML=`<input class="opt-inp" id="kopt-${i}" type="text" value="${opt}"><button class="opt-del" onclick="delKokkaiOpt(${i})" title="削除">×</button>`;
    wrap.appendChild(row);
  });
}

function addKokkaiOpt(){cfg.kokkaiOpts.push('新しい選択肢');buildKokkaiOptEdit();}
function delKokkaiOpt(i){if(cfg.kokkaiOpts.length<=1){alert('選択肢は最低1つ必要です。');return;}cfg.kokkaiOpts.splice(i,1);buildKokkaiOptEdit();}
function toggleReqBadge(key,checked){const b=document.getElementById('badge-'+key);if(b){b.className=checked?'badge-req':'badge-opt';b.textContent=checked?'必須':'任意';}}

function applyEdits(){
  cfg.title=document.getElementById('ed-title').value.trim()||cfg.title;
  cfg.qs.forEach(q=>{
    const inp=document.getElementById('ed-'+q.key),chk=document.getElementById('req-'+q.key);
    if(inp&&inp.value.trim())q.label=inp.value.trim();
    if(chk&&!q.fixed)q.req=chk.checked;
  });
  const newOpts=[];
  cfg.kokkaiOpts.forEach((_,i)=>{const inp=document.getElementById('kopt-'+i);if(inp&&inp.value.trim())newOpts.push(inp.value.trim());});
  if(newOpts.length>0)cfg.kokkaiOpts=newOpts;
  applyConfig();buildKokkaiOptEdit();
  showAdmToast('edit-toast','フォームに反映しました。');
}
function resetEdits(){cfg=JSON.parse(JSON.stringify(DEFAULTS));buildEditUI();applyConfig();showAdmToast('edit-toast','初期値に戻しました。');}

function updatePreview(){
  document.getElementById('prev-title').textContent=cfg.title;
  const hasReq=cfg.qs.some(q=>q.req);
  document.getElementById('prev-req-note').textContent=hasReq?'* は必須項目です':'';
  document.getElementById('prev-questions').innerHTML=cfg.qs.map(q=>{
    let extra='';
    if(q.key==='q4'){
      const allOpts=[...cfg.kokkaiOpts,'その他','なし'];
      extra=`<div class="prev-opts">${allOpts.map(o=>`<span class="prev-opt">${o}</span>`).join('')}</div>`;
    } else if(q.key==='q2'){
      extra=`<div class="prev-note">総支部選択 → 支部一覧 or 合同開催（自由入力）</div>`;
    } else {
      extra=`<div class="prev-note">${q.note}</div>`;
    }
    return `<div class="prev-sec"><div class="prev-qt">${q.label}${q.req?'<span style="color:#d93025;margin-left:3px">*</span>':''}</div>${extra}</div>`;
  }).join('');
}

function updateMembers(){
  const g=document.getElementById('gikai').value,wrap=document.getElementById('member-wrap'),list=document.getElementById('member-list');
  list.innerHTML='';
  if(!g){wrap.classList.add('hidden');return;}
  const entry=GIKAI_DATA.find(d=>d.g===g);
  if(!entry){wrap.classList.add('hidden');return;}
  entry.members.forEach(m=>{
    const div=document.createElement('label');div.className='member-radio';
    div.innerHTML=`<input type="radio" name="member" value="${m.n}" onchange="highlightMember(this)"><span class="member-name">${m.n}</span><span class="member-kana">（${m.k}）</span>`;
    list.appendChild(div);
  });
  wrap.classList.remove('hidden');
}
function highlightMember(r){document.querySelectorAll('.member-radio').forEach(el=>el.classList.remove('selected'));r.closest('.member-radio').classList.add('selected');}
function buildDays(){
  const m=parseInt(document.getElementById('month').value),dayEl=document.getElementById('day');
  dayEl.innerHTML='<option value="">日</option>';document.getElementById('dow-disp').textContent='';
  if(!m)return;const yr=(m>=4)?2026:2027,dim=new Date(yr,m,0).getDate();
  for(let i=1;i<=dim;i++){const o=document.createElement('option');o.value=i;o.textContent=i;dayEl.appendChild(o);}
}
function showDow(){
  const m=parseInt(document.getElementById('month').value),d=parseInt(document.getElementById('day').value);
  if(!m||!d)return;const yr=(m>=4)?2026:2027;
  document.getElementById('dow-disp').textContent='曜日：'+DOW[new Date(yr,m-1,d).getDay()]+'曜日';
}
function toggleOther(){
  const v=document.querySelector('input[name=kokkai]:checked')?.value;
  document.getElementById('other-wrap').classList.toggle('hidden',v!=='その他');
}
function getDateStr(){
  const m=document.getElementById('month').value,d=document.getElementById('day').value;
  if(!m||!d)return '';const yr=(parseInt(m)>=4)?2026:2027;
  return m+'/'+d+'（'+DOW[new Date(yr,parseInt(m)-1,parseInt(d)).getDay()]+'）';
}
function getKokkai(){
  const v=document.querySelector('input[name=kokkai]:checked')?.value||'';
  return v==='その他'?'その他：'+document.getElementById('other-name').value:v;
}
function toast(id,msg){const t=document.getElementById(id);t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
function showAdmToast(id,msg){const t=document.getElementById(id);t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}

function validateForm(){
  const vals={
    q1:()=>{const g=document.getElementById('gikai').value,m=document.querySelector('input[name=member]:checked')?.value||'';return g&&m;},
    q2:()=>document.getElementById('soushi').value,
    q3:()=>getDateStr(),
    q4:()=>document.querySelector('input[name=kokkai]:checked')?.value,
    q5:()=>document.getElementById('sonen').value.trim(),
    q6:()=>document.getElementById('josi').value.trim(),
    q7:()=>document.getElementById('seinen').value.trim(),
    q8:()=>document.getElementById('freeText').value.trim()
  };
  const errs=[];
  cfg.qs.forEach(q=>{if(q.req&&vals[q.key]&&!vals[q.key]())errs.push(q.label+'を入力してください');});
  return errs;
}
function submitForm(){
  const errs=validateForm();if(errs.length){toast('f-toast',errs[0]);return;}
  const now=new Date(),ts=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  submissions.push({
    id:Date.now(),送信日時:ts,
    議会名:document.getElementById('gikai').value,
    氏名:document.querySelector('input[name=member]:checked')?.value||'',
    総支部:document.getElementById('soushi').value,
    開催単位:getShibuValue(),
    開催日時:getDateStr(),
    国会担当:getKokkai(),
    壮年:document.getElementById('sonen').value,
    女性:document.getElementById('josi').value,
    青年:document.getElementById('seinen').value,
    自由記述:document.getElementById('freeText').value
  });
  toast('f-toast','送信しました。ありがとうございました。');setTimeout(resetForm,800);
}
function resetForm(){
  document.getElementById('gikai').value='';document.getElementById('member-list').innerHTML='';document.getElementById('member-wrap').classList.add('hidden');
  document.getElementById('soushi').value='';document.getElementById('shibu').innerHTML='<option value="">選択してください</option>';
  document.getElementById('shibu-wrap').classList.add('hidden');document.getElementById('godo-wrap').classList.add('hidden');document.getElementById('godo-text').value='';
  ['month','day'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('day').innerHTML='<option value="">日</option>';document.getElementById('dow-disp').textContent='';
  document.querySelectorAll('input[name=kokkai]').forEach(r=>r.checked=false);
  document.getElementById('other-wrap').classList.add('hidden');document.getElementById('other-name').value='';
  ['sonen','josi','seinen'].forEach(id=>document.getElementById(id).value='');document.getElementById('freeText').value='';
}
function renderAdmin(){renderStats();renderTable();}
function renderStats(){
  const t=submissions.length,s=submissions.reduce((a,r)=>a+(parseInt(r.壮年)||0),0),j=submissions.reduce((a,r)=>a+(parseInt(r.女性)||0),0),n=submissions.reduce((a,r)=>a+(parseInt(r.青年)||0),0);
  document.getElementById('adm-stats').innerHTML=`<div class="sc"><div class="sc-num">${t}</div><div class="sc-lbl">回答件数</div></div><div class="sc"><div class="sc-num">${s}</div><div class="sc-lbl">壮年 合計</div></div><div class="sc"><div class="sc-num">${j}</div><div class="sc-lbl">女性 合計</div></div><div class="sc"><div class="sc-num">${n}</div><div class="sc-lbl">青年 合計</div></div>`;
}
function getFiltered(){
  const fg=document.getElementById('f-gikai')?.value||'',fs=document.getElementById('f-soushi')?.value||'',fk=document.getElementById('f-kokkai')?.value||'';
  return submissions.filter(r=>{
    if(fg&&r.議会名!==fg)return false;
    if(fs&&r.総支部!==fs)return false;
    if(fk&&!r.国会担当.startsWith(fk))return false;
    return true;
  });
}
function renderTable(){
  const rows=getFiltered(),wrap=document.getElementById('tbl-wrap');updateSelCnt();
  if(!rows.length){wrap.innerHTML='<div class="empty">回答がまだありません</div>';return;}
  let h=`<div style="overflow-x:auto"><table class="atbl"><thead><tr>
    <th><input type="checkbox" id="cb-all" onchange="toggleAll(this)" style="accent-color:#7248b9;cursor:pointer"></th>
    <th>送信日時</th><th>議会名</th><th>氏名</th><th>総支部</th><th>開催単位</th><th>開催日時</th><th>国会担当</th><th>壮年</th><th>女性</th><th>青年</th><th></th>
  </tr></thead><tbody>`;
  rows.forEach(r=>{h+=`<tr>
    <td><input type="checkbox" class="cb-row" data-id="${r.id}" onchange="updateSelCnt()" style="accent-color:#7248b9;cursor:pointer"></td>
    <td style="white-space:nowrap">${r.送信日時}</td><td>${r.議会名}</td><td style="white-space:nowrap">${r.氏名}</td>
    <td>${r.総支部}</td><td>${r.開催単位}</td><td style="white-space:nowrap">${r.開催日時}</td><td>${r.国会担当}</td>
    <td>${r.壮年}</td><td>${r.女性}</td><td>${r.青年}</td>
    <td><button class="del-btn" onclick="delRow(${r.id})">削除</button></td>
  </tr>`;});
  h+=`</tbody></table></div>`;wrap.innerHTML=h;
}
function toggleAll(cb){document.querySelectorAll('.cb-row').forEach(c=>c.checked=cb.checked);updateSelCnt();}
function updateSelCnt(){const n=document.querySelectorAll('.cb-row:checked').length;const el=document.getElementById('sel-cnt');if(el)el.textContent=n?n+'件を選択中':'';}
function delRow(id){submissions=submissions.filter(r=>r.id!==id);renderAdmin();}
function buildSheet(rows){
  const HDR=['送信日時','議会名','氏名','総支部','開催単位','開催日時','国会担当','壮年参加者数','女性参加者数','青年参加者数','自由記述'];
  const aoa=[HDR,...rows.map(r=>[r.送信日時,r.議会名,r.氏名,r.総支部,r.開催単位,r.開催日時,r.国会担当,r.壮年,r.女性,r.青年,r.自由記述])];
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:18},{wch:14},{wch:12},{wch:10},{wch:18},{wch:12},{wch:14},{wch:10},{wch:8},{wch:8},{wch:40}];
  const hS={font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'7248B9'}},alignment:{horizontal:'center'}};
  HDR.forEach((_,i)=>{const c=XLSX.utils.encode_cell({r:0,c:i});if(ws[c])ws[c].s=hS;});
  return ws;
}
function exportAll(){
  if(!submissions.length){toast('adm-toast','回答データがありません');return;}
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,buildSheet(submissions),'全件一覧');
  XLSX.writeFile(wb,'支部会開催報告_全件_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'')+'.xlsx');
  toast('adm-toast','全'+submissions.length+'件をExcelに出力しました');
}
function exportSelected(){
  const ids=Array.from(document.querySelectorAll('.cb-row:checked')).map(c=>parseInt(c.dataset.id));
  if(!ids.length){toast('adm-toast','出力する行をチェックしてください');return;}
  const rows=submissions.filter(r=>ids.includes(r.id));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,buildSheet(rows),'選択した回答');
  XLSX.writeFile(wb,'支部会開催報告_選択'+rows.length+'件_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'')+'.xlsx');
  toast('adm-toast',rows.length+'件をExcelに出力しました');
}
init();
</script>
